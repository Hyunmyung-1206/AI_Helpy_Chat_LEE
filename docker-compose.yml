services:
  selenium:
    image: selenium/standalone-chrome:latest
    shm_size: 2gb
    ports:
      - "4444:4444"
      - "7900:7900"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/status"]
      interval: 5s
      timeout: 5s
      retries: 20

  tests:
    build:
      context: .
    depends_on:
      selenium:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DOWNLOAD_DIR: "/tmp/ai_helpy_chat_downloads"
      HEADLESS: "true"
      JIRA_API_TOKEN: ""
      JIRA_BASE_URL: ""
      JIRA_EMAIL: ""
      JIRA_PROJECT_KEY: ""
      SELENIUM_REMOTE_URL: "http://selenium:4444/wd/hub"
      SLACK_WEBHOOK_FAILURES_URL: ""
      SLACK_WEBHOOK_URL: ""
      PYTHONUNBUFFERED: "1"
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
    volumes:
      - .:/app
      - ./logs:/app/logs
    command:
      - pytest
      - -n
      - "3"
      - -m
      - not slow
      - tests/test_quiz_create.py
      - tests/test_ppt_create.py
      - tests/test_deep_create.py
      - --tb=short
