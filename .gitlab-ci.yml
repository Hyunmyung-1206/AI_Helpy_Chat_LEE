stages:
  - test

variables:
  HEADLESS: "true"
  PYTHONUNBUFFERED: "1"
  PYTHONUTF8: "1"
  PYTHONIOENCODING: "utf-8"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

ui_fast:
  stage: test
  before_script:
    - chcp 65001
    - $env:PYTHONUTF8 = "1"
    - $env:PYTHONIOENCODING = "utf-8"
    - "[Console]::OutputEncoding = [System.Text.Encoding]::UTF8"
    - New-Item -ItemType Directory -Force logs
  script:
    - |
      $pythonCandidates = @(
        @{ Exe = "$env:PYTHON_EXE"; Args = @() },
        @{ Exe = "python"; Args = @() },
        @{ Exe = "py"; Args = @("-3") },
        @{ Exe = "$env:LOCALAPPDATA\Programs\Python\Python314\python.exe"; Args = @() },
        @{ Exe = "$env:LOCALAPPDATA\Programs\Python\Python313\python.exe"; Args = @() },
        @{ Exe = "$env:LOCALAPPDATA\Programs\Python\Python312\python.exe"; Args = @() },
        @{ Exe = "C:\Python314\python.exe"; Args = @() },
        @{ Exe = "C:\Python313\python.exe"; Args = @() },
        @{ Exe = "C:\Python312\python.exe"; Args = @() }
      )

      $pythonExe = $null
      $pythonArgs = @()
      foreach ($candidate in $pythonCandidates) {
        $exe = $candidate.Exe
        if (-not $exe) {
          continue
        }

        $exists = (Get-Command $exe -ErrorAction SilentlyContinue) -or (Test-Path -LiteralPath $exe)
        if (-not $exists) {
          continue
        }

        & $exe @($candidate.Args) --version
        if ($LASTEXITCODE -eq 0) {
          $pythonExe = $exe
          $pythonArgs = @($candidate.Args)
          break
        }
      }

      if (-not $pythonExe) {
        Write-Error "Python executable was not found on this GitLab Runner. Install Python or add it to PATH."
        exit 1
      }

      & $pythonExe @pythonArgs -m pip install -r requirements.txt
      if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      & $pythonExe @pythonArgs -m pytest -n 3 -m "not slow" tests/test_quiz_create.py tests/test_ppt_create.py tests/test_deep_create.py --tb=short --junitxml=logs/junit-ui-fast.xml
  artifacts:
    when: always
    reports:
      junit: logs/junit-ui-fast.xml
    paths:
      - logs/
    expire_in: 1 week
